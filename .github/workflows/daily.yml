name: Daily Ticket Price Tracker

on:
  schedule:
    # 00:00 UTC = 9:00 AM JST. Cron is always UTC — adjust the hour below if
    # you want a different local time (e.g. '0 15 * * *' = 00:00 JST).
    - cron: '0 0 * * *'
  workflow_dispatch: {}  # lets you trigger a run manually from the Actions tab, for testing

# Needed so this workflow can commit the updated dashboard/history back to the repo
permissions:
  contents: write

jobs:
  track-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tracker
        run: python track_prices.py

      - name: Commit and push updated dashboard + history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.json dashboard.html
          git diff --staged --quiet || git commit -m "Daily ticket price update $(date -u +'%Y-%m-%d')"
          git push
